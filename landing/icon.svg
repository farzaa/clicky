<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="arrow-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4d9fff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4d9fff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="arrow-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#06060e"/>

  <!-- Subtle radial glow behind arrow -->
  <ellipse cx="256" cy="280" rx="160" ry="180" fill="url(#glow)"/>

  <!-- Stars -->
  <circle cx="140" cy="100" r="4" fill="#4d9fff" opacity="0.5"/>
  <circle cx="380" cy="80" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="400" cy="140" r="2.5" fill="#00e5ff" opacity="0.35"/>
  <circle cx="120" cy="180" r="2" fill="#ffc847" opacity="0.3"/>
  <circle cx="350" cy="420" r="3" fill="#4d9fff" opacity="0.25"/>
  <circle cx="160" cy="400" r="2" fill="#8b5cf6" opacity="0.2"/>

  <!-- Main arrow -->
  <g filter="url(#arrow-glow)">
    <path
      d="M256 96 L256 352 M144 272 L256 384 L368 272"
      stroke="url(#arrow-gradient)"
      stroke-width="40"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- Gold coin accents (representing spending gold) -->
  <circle cx="100" cy="320" r="12" fill="none" stroke="#ffc847" stroke-width="2" opacity="0.3"/>
  <circle cx="412" cy="300" r="10" fill="none" stroke="#ffc847" stroke-width="2" opacity="0.25"/>
  <circle cx="80" cy="260" r="8" fill="none" stroke="#ffc847" stroke-width="1.5" opacity="0.2"/>
</svg>

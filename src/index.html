<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sewa Companion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="status-bar">
      <span class="status-dot disconnected"></span>
      <span id="status-text">Disconnected</span>
    </div>

    <div id="messages"></div>

    <form id="chat-form">
      <input type="text" id="chat-input" placeholder="Message Sewa..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="main.js"></script>
</body>
</html>
